**REGULATORY:** Alberta (AER D065 incl §4.1.8 seismicity, D051 Class III wells, D056 applications, Alta Reg 68/2011 tenure, MMA §15.1 pore space, MMA Part 9 liability transfer, TIER $95-170/tCO2e, CSA Z741). US EPA (Class VI 40 CFR 146.81-95, AoR §146.84, ≤90% Pfrac, 50yr PISC, Subpart RR MRV, 45Q $85/$180/t, PHMSA pipelines, state primacy: ND/WY/LA/WV/AZ/TX). International (ISO 27914/27913/27916, DNV-RP-J203, EU CCS Directive, London Protocol, IPCC SRCCS).

    /* ─────────────── COMPONENTS ─────────────── */

    function TypingDots() {

    function Md({ text }) {
      const lines = (text || '').split('\n');
      return React.createElement('div', null, lines.map((line, idx) => {
        let h = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`(.+?)`/g, '<code style="background:#1a2e1a;padding:2px 6px;border-radius:3px;font-size:0.88em;color:#7ddfb0">$1</code>')

        if (line.startsWith('### ')) return React.createElement('h4', { key:idx, style:{color:'#7ddfb0',margin:'14px 0 6px',fontSize:'1em',fontWeight:700}, dangerouslySetInnerHTML:{__html:h.slice(4)} });

        if (/^\d+\.\s/.test(line)) { const m=line.match(/^(\d+\.)\s(.*)/); return React.createElement('div', { key:idx, style:{paddingLeft:20,margin:'3px 0',position:'relative'} },
          React.createElement('span', { style:{position:'absolute',left:0,color:'#5ba88a',fontWeight:600} }, m[1]),
          React.createElement('span', { dangerouslySetInnerHTML:{__html:m[2].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code style="background:#1a2e1a;padding:2px 5px;border-radius:3px;font-size:0.88em;color:#7ddfb0">$1</code>')} })
        ); }
        if (line.startsWith('|') && line.endsWith('|')) {
          const cells = line.split('|').filter(c=>c.trim()).map(c=>c.trim());
          if (cells.every(c=>/^[-:]+$/.test(c))) return null;
          return React.createElement('div', { key:idx, style:{display:'flex',borderBottom:'1px solid #1f3a2a',fontSize:'0.88em'} },
            cells.map((c,ci) => React.createElement('div', { key:ci, style:{flex:1,padding:'5px 8px',color:'#b0c8b8'}, dangerouslySetInnerHTML:{__html:c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')} }))

        return React.createElement('p', { key:idx, style:{margin:'4px 0',lineHeight:1.6}, dangerouslySetInnerHTML:{__html:h} });
      }));

    /* ─────────────── MAIN APP ─────────────── */

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('ccus_api_key') || '');
      const [showKeyModal, setShowKeyModal] = useState(!apiKey);
      const [view, setView] = useState('dashboard');
      const [activeTab, setActiveTab] = useState('alberta');
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [userLevel, setUserLevel] = useState('engineer');
      const chatEnd = useRef(null);

      useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

      const send = useCallback(async (text) => {
        if (!text.trim() || loading) return;
        if (!apiKey || apiKey === 'BROWSE_ONLY') { setShowKeyModal(true); return; }

        const userMsg = { role:'user', content:text.trim() };
        const next = [...messages, userMsg];
        setMessages(next);
        setInput('');
        setLoading(true);

        const levelCtx = userLevel==='engineer' ? 'User is a technical engineer. Full technical depth, specific clause numbers, engineering parameters.'
          : userLevel==='regulator' ? 'User is a regulator. Focus on compliance pathways, enforcement mechanisms.'
          : 'User is an investor/developer. Focus on economics, risk profiles, timelines, commercial viability.';

        try {
          const r = await fetch('https://api.anthropic.com/v1/messages', {
            method:'POST',
            headers: { 'Content-Type':'application/json', 'x-api-key': apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
            body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4000, system: SYS_PROMPT + '\n\n' + levelCtx, messages: next.slice(-12).map(m=>({role:m.role,content:m.content})) })
          });
          if (r.status === 401) {
            setMessages(p => [...p, { role:'assistant', content:'⚠️ **Invalid API key.** Please check your key and try again. Go to [console.anthropic.com](https://console.anthropic.com/) to verify.' }]);
            setLoading(false); return;
          }
          const d = await r.json();
          const txt = d.content?.map(b=>b.text||'').join('\n') || 'Error processing request.';
          setMessages(p => [...p, { role:'assistant', content:txt }]);
        } catch(e) {
          setMessages(p => [...p, { role:'assistant', content:'⚠️ **Connection error.** Check your network. If this persists, your API key may be invalid or you may have hit rate limits.' }]);
        }
        setLoading(false);
      }, [messages, loading, apiKey, userLevel]);

      const keyDown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(input); } };

      const goChat = (q) => { setView('chat'); setTimeout(() => send(q), 150); };

      /* ── Key Modal ── */
      if (showKeyModal) return React.createElement(ApiKeyModal, {
        onSave: (k) => { setApiKey(k); setShowKeyModal(false); }
      });

      /* ── RegCard ── */
      const RegCard = ({ item }) => React.createElement('div', {

            style:{color:'#4a9070',fontSize:'0.75em',textDecoration:'none'} }, '📄 Source ↗')

      const navItems = [
        { id:'dashboard', label:'Dashboard', icon:'◈' },
        { id:'chat', label:'AI Advisor', icon:'◉' },
        { id:'capture', label:'Capture Tech', icon:'⬡' },
